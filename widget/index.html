<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='128' height='128' viewBox='0 0 128 128' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='16' y1='16' x2='112' y2='112' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%230EA5E9'/%3E%3Cstop offset='1' stop-color='%234F46E5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='8' y='8' width='112' height='112' rx='28' fill='url(%23g)'/%3E%3Cpath d='M36 72C36 56.536 48.536 44 64 44H92V60H64C57.373 60 52 65.373 52 72C52 78.627 57.373 84 64 84H76C89.255 84 100 94.745 100 108V120H84V108C84 101.373 78.627 96 72 96H64C48.536 96 36 83.464 36 68V72Z' fill='white'/%3E%3Cpath d='M56 32H88V44H56V32Z' fill='white' fill-opacity='0.92'/%3E%3C/svg%3E" />
    <title>FlowLyra Widget Test</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: #eef4ff;
        color: #0f172a;
      }
      main {
        max-width: 1040px;
        margin: 80px auto;
        padding: 0 24px;
      }
      h1 {
        font-size: 36px;
        margin: 0 0 12px;
      }
      p {
        color: #475569;
        line-height: 1.6;
      }
      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 28px;
        align-items: center;
      }
      .panel {
        border: 1px solid #dbe4f0;
        border-radius: 18px;
        background: white;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }
      .metric {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #e2e8f0;
        padding: 12px 0;
        color: #475569;
      }
      .metric strong {
        color: #0f172a;
      }
      button {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: white;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }
      @media (max-width: 820px) {
        .hero { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <section>
          <h1>FlowLyra Widget Test</h1>
          <p>This page simulates a customer website. Open the chat bubble, fill the pre-chat fields, and confirm messages arrive in the agent inbox.</p>
          <button id="reset-flowlyra-session" type="button">Reset widget session</button>
        </section>
        <aside class="panel">
          <div class="metric"><span>Live agents</span><strong>Online</strong></div>
          <div class="metric"><span>Widget mode</span><strong>Human chat</strong></div>
          <div class="metric"><span>Typing preview</span><strong>Enabled</strong></div>
          <div class="metric"><span>Install URL</span><strong>/src/Widget.ts</strong></div>
        </aside>
      </div>
    </main>
    <script>
      document.getElementById("reset-flowlyra-session").addEventListener("click", function () {
        localStorage.removeItem("cf_session_token");
        location.reload();
      });
    </script>
    <script>
      window.FlowLyraConfig = {
        orgSlug: "test-org",
        apiUrl: "http://localhost:8000"
      };
    </script>
    <script type="module" src="/src/Widget.ts"></script>
  </body>
</html>
