<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowLyra Offline</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        width: min(92vw, 460px);
        border-radius: 18px;
        padding: 24px;
        background: linear-gradient(145deg, #111827, #0b1220);
        border: 1px solid #334155;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 0; color: #93c5fd; line-height: 1.6; }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        background: #1d4ed8;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>FlowLyra cached shell is available. Reconnect to sync chats, tickets, and notifications.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
