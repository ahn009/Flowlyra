services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chatflow
      POSTGRES_USER: cf_user
      POSTGRES_PASSWORD: cf_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cf_user", "-d", "chatflow"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m scripts.seed_dev && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ../backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  widget:
    build:
      context: ../widget
    ports:
      - "5174:5174"
    volumes:
      - ../widget:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  pgdata:
